<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="latin-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"
    >
</head>

<body>

<main class="container">

    <h2>Upload Sales Files</h2>

    <form
        action="/upload"
        method="POST"
        enctype="multipart/form-data"
    >

        <label>
            Activation Detail Report
            <input
                type="file"
                name="file1"
                required
            >
        </label>

        <label>
            Callidus Report
            <input
                type="file"
                name="file2"
                required
            >
        </label>

        <label>
            CurCallidus Report
            <input
                type="file"
                name="file2"
                required
            >
        </label>

        <button type="submit">
            Upload Files
        </button>

    </form>

</main>

</body>
</html>
